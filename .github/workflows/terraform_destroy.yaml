name: Terraform Destroy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to destroy"
        required: true
        type: choice
        options:
          - staging
          - production
      confirm:
        description: "Type the environment name to confirm"
        required: true
  workflow_call:

env:
  TF_VERSION: 1.11.1

jobs:
  destroy:
    name: Destroy ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == github.event.inputs.environment

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Set Terraform directory
        id: vars
        run: |
          ENV="${{ github.event.inputs.environment }}"
          if [ "$ENV" = "staging" ]; then
            echo "tf_dir=environments/Staging" >> "$GITHUB_OUTPUT"
          else
            echo "tf_dir=environments/Production" >> "$GITHUB_OUTPUT"
          fi
          echo "cluster=togglemaster-${ENV}-cluster" >> "$GITHUB_OUTPUT"

      - name: Configure kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ steps.vars.outputs.cluster }} \
            --region ${{ env.AWS_REGION }} 2>/dev/null || echo "Cluster não encontrado, pulando kubectl setup"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ steps.vars.outputs.tf_dir }}
        run: terraform init

      - name: Cleanup Kubernetes Services
        run: |
          kubectl delete svc --all -n analytics-service --ignore-not-found=true 2>/dev/null || true
          kubectl delete svc --all -n flag-service --ignore-not-found=true 2>/dev/null || true
          kubectl delete svc --all -n notification-service --ignore-not-found=true 2>/dev/null || true
          kubectl delete svc --all -n decision-service --ignore-not-found=true 2>/dev/null || true
          kubectl delete svc --all -n user-service --ignore-not-found=true 2>/dev/null || true
          sleep 30

      - name: Remove Kubernetes Finalizers
        run: |
          kubectl patch ns analytics-service -p '{"metadata":{"finalizers":[]}}' --type=merge 2>/dev/null || true
          kubectl patch ns flag-service -p '{"metadata":{"finalizers":[]}}' --type=merge 2>/dev/null || true
          kubectl patch ns notification-service -p '{"metadata":{"finalizers":[]}}' --type=merge 2>/dev/null || true
          kubectl patch ns decision-service -p '{"metadata":{"finalizers":[]}}' --type=merge 2>/dev/null || true
          kubectl patch ns user-service -p '{"metadata":{"finalizers":[]}}' --type=merge 2>/dev/null || true

      - name: Terraform Destroy
        working-directory: ${{ steps.vars.outputs.tf_dir }}
        run: terraform destroy -auto-approve -lock=false
        env:
          TF_CLI_ARGS: "-var-file=terraform.tfvars -max-retries=5"
