name: Terraform Destroy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to destroy"
        required: true
        type: choice
        options:
          - staging
          - production
      confirm:
        description: "Type the environment name to confirm"
        required: true
  workflow_call:

env:
  TF_VERSION: 1.11.1

jobs:
  destroy:
    name: Destroy ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == github.event.inputs.environment

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Set Terraform directory
        id: vars
        run: |
          ENV="${{ github.event.inputs.environment }}"
          if [ "$ENV" = "staging" ]; then
            echo "tf_dir=Terraform/environments/Staging" >> "$GITHUB_OUTPUT"
          else
            echo "tf_dir=Terraform/environments/Production" >> "$GITHUB_OUTPUT"
          fi
          echo "cluster=togglemaster-${ENV}-cluster" >> "$GITHUB_OUTPUT"

      - name: Configure kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ steps.vars.outputs.cluster }} \
            --region ${{ env.AWS_REGION }} 2>/dev/null || echo "Cluster não encontrado, pulando kubectl setup"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ steps.vars.outputs.tf_dir }}
        run: terraform init

      - name: Terraform Destroy
        working-directory: ${{ steps.vars.outputs.tf_dir }}
        run: terraform destroy -auto-approve
