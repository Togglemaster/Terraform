name: Terraform Destroy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to destroy"
        required: true
        type: choice
        options:
          - staging
          - production
      confirm:
        description: "Type the environment name to confirm"
        required: true
  workflow_call:

env:
  TF_VERSION: 1.11.1
  AWS_REGION: us-east-1

jobs:
  destroy:
    name: Destroy ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == github.event.inputs.environment

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set Terraform directory
        id: vars
        run: |
          ENV="${{ github.event.inputs.environment }}"
          if [ "$ENV" = "staging" ]; then
            echo "tf_dir=environments/Staging" >> "$GITHUB_OUTPUT"
          else
            echo "tf_dir=environments/Production" >> "$GITHUB_OUTPUT"
          fi
          echo "cluster=togglemaster-${ENV}-cluster" >> "$GITHUB_OUTPUT"

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Configure kubeconfig
        id: kubeconfig
        continue-on-error: true
        run: |
          aws eks update-kubeconfig \
            --name ${{ steps.vars.outputs.cluster }} \
            --region ${{ env.AWS_REGION }}

      - name: Cleanup Kubernetes LoadBalancers
        if: steps.kubeconfig.outcome == 'success'
        continue-on-error: true
        run: |
          for ns in auth-service flag-service targeting-service evaluation-service analytics-service; do
            echo "Limpando LoadBalancers no namespace: $ns"
            kubectl delete svc --all -n $ns --grace-period=30 --ignore-not-found=true || true
          done
          echo "Aguardando AWS limpar os LoadBalancers..."
          sleep 60

      - name: Remove Kubernetes Finalizers
        if: steps.kubeconfig.outcome == 'success'
        continue-on-error: true
        run: |
          for ns in auth-service flag-service targeting-service evaluation-service analytics-service; do
            echo "Removendo finalizers do namespace: $ns"
            kubectl patch ns $ns -p '{"metadata":{"finalizers":[]}}' --type=merge || true
          done

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ steps.vars.outputs.tf_dir }}
        run: terraform init

      - name: Terraform Destroy
        working-directory: ${{ steps.vars.outputs.tf_dir }}
        run: terraform destroy -auto-approve
