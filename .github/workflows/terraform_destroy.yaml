name: Terraform Destroy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to destroy"
        required: true
        type: choice
        options:
          - staging
          - production
      confirm:
        description: "Type the environment name to confirm"
        required: true
  workflow_call:

env:
  TF_VERSION: 1.11.1
  AWS_REGION: us-east-1

jobs:
  destroy:
    name: Destroy ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == github.event.inputs.environment

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set Terraform directory
        id: vars
        run: |
          ENV="${{ github.event.inputs.environment }}"
          if [ "$ENV" = "staging" ]; then
            echo "tf_dir=environments/Staging" >> "$GITHUB_OUTPUT"
          else
            echo "tf_dir=environments/Production" >> "$GITHUB_OUTPUT"
          fi
          echo "cluster=togglemaster-${ENV}-cluster" >> "$GITHUB_OUTPUT"

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Configure kubeconfig
        id: kubeconfig
        continue-on-error: true
        run: |
          aws eks update-kubeconfig \
            --name ${{ steps.vars.outputs.cluster }} \
            --region ${{ env.AWS_REGION }}

      - name: Cleanup Kubernetes Resources (Nuclear)
        if: steps.kubeconfig.outcome == 'success'
        continue-on-error: true
        run: |
          NAMESPACES="auth-service flag-service targeting-service evaluation-service analytics-service"

          # 1. Deletar Services (libera LoadBalancers AWS)
          for ns in $NAMESPACES; do
            kubectl get ns $ns >/dev/null 2>&1 || continue
            echo "==> [$ns] Deletando Services..."
            kubectl delete svc --all -n $ns --grace-period=30 --ignore-not-found=true || true
          done

          echo "Aguardando AWS liberar os LoadBalancers (60s)..."
          sleep 60

          # 2. Force-delete recursos internos (pods, deployments, statefulsets, pvcs)
          for ns in $NAMESPACES; do
            kubectl get ns $ns >/dev/null 2>&1 || continue
            echo "==> [$ns] Force-deletando workloads..."
            kubectl delete all --all -n $ns --force --grace-period=0 --ignore-not-found=true || true
            kubectl delete pvc --all -n $ns --force --grace-period=0 --ignore-not-found=true || true
            kubectl delete configmap --all -n $ns --ignore-not-found=true || true
            kubectl delete secret --all -n $ns --ignore-not-found=true || true
          done

          # 3. Remover finalizers de pods presos
          for ns in $NAMESPACES; do
            kubectl get ns $ns >/dev/null 2>&1 || continue
            for pod in $(kubectl get pods -n $ns -o name 2>/dev/null); do
              echo "==> [$ns] Removendo finalizers de $pod"
              kubectl patch $pod -n $ns -p '{"metadata":{"finalizers":[]}}' --type=merge || true
            done
            for pvc in $(kubectl get pvc -n $ns -o name 2>/dev/null); do
              echo "==> [$ns] Removendo finalizers de $pvc"
              kubectl patch $pvc -n $ns -p '{"metadata":{"finalizers":[]}}' --type=merge || true
            done
          done

          # 4. Forçar finalização do namespace via API raw (último recurso)
          for ns in $NAMESPACES; do
            kubectl get ns $ns >/dev/null 2>&1 || continue
            echo "==> [$ns] Forçando finalização via API..."
            kubectl get ns $ns -o json \
              | jq '.spec.finalizers = [] | .metadata.finalizers = []' \
              | kubectl replace --raw "/api/v1/namespaces/$ns/finalize" -f - || true
          done

          sleep 10
          kubectl get ns 2>/dev/null || echo "Cluster inacessível"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ steps.vars.outputs.tf_dir }}
        run: terraform init

      - name: Terraform Destroy
        working-directory: ${{ steps.vars.outputs.tf_dir }}
        run: terraform destroy -auto-approve
